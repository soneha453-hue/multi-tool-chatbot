<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multi-Tool Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4ef; --surface: #ffffff; --sidebar: #f0ede6;
      --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.18);
      --accent: #c96442; --accent-hover: #a0522d; --accent-light: #f5ede8;
      --text: #1a1915; --muted: #6b6860; --danger: #c0392b;
      --radius: 12px; --sans: 'Segoe UI', system-ui, sans-serif; --serif: 'Georgia', serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
    #sidebar { width: 240px; min-width: 240px; background: var(--sidebar); border-right: 0.5px solid var(--border-strong); display: flex; flex-direction: column; padding: 14px 10px; gap: 10px; }
    #sidebar-title { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 0 6px; }
    #new-btn { background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background 0.2s; }
    #new-btn:hover { background: var(--accent-hover); }
    #thread-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
    .titem { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-radius: 9px; cursor: pointer; font-size: 12.5px; color: var(--muted); transition: background 0.15s; }
    .titem:hover { background: rgba(0,0,0,0.05); color: var(--text); }
    .titem.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .tname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dbtn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 2px 5px; border-radius: 5px; line-height: 1; transition: color 0.15s; }
    .dbtn:hover { color: var(--danger); }
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #header { padding: 14px 22px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 11px; background: var(--surface); }
    .hav { width: 34px; height: 34px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
    #header h1 { font-size: 15px; font-weight: 600; }
    #header p { font-size: 11.5px; color: var(--muted); }
    .sdot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 4px; }
    #chat-win { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; background: var(--bg); }
    #empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center; flex: 1; color: var(--muted); padding: 60px 20px; }
    #empty .eicon { font-size: 38px; }
    #empty h3 { font-size: 18px; color: var(--text); font-family: var(--serif); font-weight: 400; }
    #empty p { font-size: 13px; max-width: 320px; line-height: 1.65; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
    .chip { background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: 20px; padding: 7px 14px; font-size: 12.5px; cursor: pointer; color: var(--text); transition: border-color 0.2s, color 0.2s; }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .msg { display: flex; gap: 10px; max-width: 760px; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }
    .mav { width: 30px; height: 30px; min-width: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .msg.user .mav { background: var(--accent); color: #fff; font-weight: 700; font-size: 11px; }
    .msg.bot .mav { background: var(--surface); border: 0.5px solid var(--border-strong); }
    .bubble { padding: 11px 15px; border-radius: var(--radius); font-size: 14px; line-height: 1.75; max-width: 580px; }
    .msg.user .bubble { background: var(--accent); color: #fff; border-radius: var(--radius) 3px var(--radius) var(--radius); }
    .msg.bot .bubble { background: var(--surface); border: 0.5px solid var(--border); border-radius: 3px var(--radius) var(--radius) var(--radius); font-family: var(--serif); }
    .bubble strong { color: var(--accent-hover); }
    .bubble a { color: var(--accent); text-decoration: underline; }
    .bubble code { background: #f5f0ec; border: 0.5px solid var(--border-strong); border-radius: 4px; padding: 2px 5px; font-size: 12.5px; font-family: monospace; }
    .bubble pre { background: #f5f0ec; border: 0.5px solid var(--border-strong); border-radius: 9px; padding: 13px; margin-top: 8px; overflow-x: auto; }
    .bubble pre code { border: none; padding: 0; background: none; }
    .bubble h2 { font-size: 14px; color: var(--accent-hover); margin: 10px 0 5px; font-weight: 600; font-family: var(--sans); }
    .bubble h3 { font-size: 13px; margin: 8px 0 4px; font-weight: 600; font-family: var(--sans); }
    .bubble ul, .bubble ol { padding-left: 18px; }
    .bubble li { margin-bottom: 3px; }
    .bubble table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; font-family: var(--sans); }
    .bubble table th, .bubble table td { border: 0.5px solid var(--border-strong); padding: 6px 10px; text-align: left; }
    .bubble table th { background: var(--accent-light); color: var(--accent-hover); }
    .bubble .src { color: var(--muted); font-size: 12px; font-family: var(--sans); display: block; margin-top: 4px; }
    .tbubble { display: flex; align-items: center; gap: 5px; padding: 13px 16px; }
    .dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    #input-area { padding: 14px 20px; border-top: 0.5px solid var(--border); background: var(--surface); display: flex; gap: 9px; align-items: flex-end; }
    #msg-in { flex: 1; background: var(--bg); border: 0.5px solid var(--border-strong); border-radius: var(--radius); color: var(--text); font-size: 14px; font-family: var(--sans); padding: 11px 14px; resize: none; outline: none; min-height: 44px; max-height: 150px; transition: border-color 0.2s; line-height: 1.5; }
    #msg-in:focus { border-color: var(--accent); }
    #msg-in::placeholder { color: var(--muted); }
    #send-btn { background: var(--accent); border: none; border-radius: var(--radius); width: 44px; height: 44px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: #fff; transition: background 0.2s, transform 0.1s; flex-shrink: 0; }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-title">Conversations</div>
  <button id="new-btn" onclick="newChat()">＋ New chat</button>
  <div id="thread-list"></div>
</div>

<div id="main">
  <div id="header">
    <div class="hav">✦</div>
    <div>
      <h1>Multi-Tool Assistant</h1>
      <p><span class="sdot"></span>Weather · Stocks · Search · Calculator</p>
    </div>
  </div>
  <div id="chat-win">
    <div id="empty">
      <div class="eicon">✦</div>
      <h3>How can I help you today?</h3>
      <p>Ask me anything — weather, stocks, math, or anything on the web.</p>
      <div class="chips">
        <span class="chip" onclick="fillInput(this)">🌤 Weather in Mumbai</span>
        <span class="chip" onclick="fillInput(this)">📈 AAPL stock price</span>
        <span class="chip" onclick="fillInput(this)">🔢 (456 * 78) / 12</span>
        <span class="chip" onclick="fillInput(this)">🔍 Latest AI news</span>
      </div>
    </div>
  </div>
  <div id="input-area">
    <textarea id="msg-in" placeholder="Message assistant..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const API = "http://127.0.0.1:8000";

  // sessionStorage se restore — page reload pe bhi safe
  let currentThreadId = sessionStorage.getItem("tid") || null;

  // ── Thread list ──────────────────────────────────────────────
  async function loadThreads() {
    try {
      const res = await fetch(`${API}/threads`);
      const data = await res.json();
      const list = document.getElementById("thread-list");
      list.innerHTML = "";
      (data.threads || []).reverse().forEach(({ thread_id, preview }) => {
        const el = document.createElement("div");
        el.className = "titem" + (thread_id === currentThreadId ? " active" : "");
        el.dataset.tid = thread_id;
        el.innerHTML = `
          <span class="tname">✦ ${preview || thread_id}</span>
          <button class="dbtn">✕</button>`;
        el.querySelector(".dbtn").addEventListener("click", (e) => {
          e.stopPropagation();
          deleteThread(thread_id);
        });
        el.addEventListener("click", () => openThread(thread_id));
        list.appendChild(el);
      });
    } catch (e) {}
  }

  function setThread(tid) {
    currentThreadId = tid;
    if (tid) sessionStorage.setItem("tid", tid);
    else sessionStorage.removeItem("tid");
  }

  function highlightActive() {
    document.querySelectorAll(".titem").forEach(el => {
      el.classList.toggle("active", el.dataset.tid === currentThreadId);
    });
  }

  async function openThread(tid) {
    if (currentThreadId === tid) return;
    setThread(tid);
    highlightActive();
    clearChatWin();
    try {
      const res = await fetch(`${API}/history/${tid}`);
      const data = await res.json();
      (data.messages || []).forEach(m => appendMessage(m.role, m.content));
      scrollDown();
    } catch (e) {}
  }

  async function deleteThread(tid) {
    try {
      await fetch(`${API}/thread`, {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ thread_id: tid })
      });
    } catch (e) {}
    if (currentThreadId === tid) {
      setThread(null);
      showEmpty();
    }
    await loadThreads();
  }

  function newChat() {
    setThread("thread-" + Date.now());
    showEmpty();
    loadThreads();
  }

  // ── Chat window ──────────────────────────────────────────────
  function clearChatWin() {
    document.getElementById("chat-win").innerHTML = "";
  }

  function showEmpty() {
    document.getElementById("chat-win").innerHTML = `
      <div id="empty">
        <div class="eicon">✦</div>
        <h3>How can I help you today?</h3>
        <p>Ask me anything — weather, stocks, math, or anything on the web.</p>
        <div class="chips">
          <span class="chip" onclick="fillInput(this)">🌤 Weather in Mumbai</span>
          <span class="chip" onclick="fillInput(this)">📈 AAPL stock price</span>
          <span class="chip" onclick="fillInput(this)">🔢 (456 * 78) / 12</span>
          <span class="chip" onclick="fillInput(this)">🔍 Latest AI news</span>
        </div>
      </div>`;
  }

  function scrollDown() {
    const w = document.getElementById("chat-win");
    w.scrollTop = w.scrollHeight;
  }

  // ── Send message ─────────────────────────────────────────────
  async function sendMessage() {
    const inp = document.getElementById("msg-in");
    const text = inp.value.trim();
    if (!text) return;

    if (!currentThreadId) setThread("thread-" + Date.now());

    const empty = document.getElementById("empty");
    if (empty) empty.remove();

    appendMessage("user", text);
    inp.value = "";
    inp.style.height = "auto";
    scrollDown();

    const typingEl = showTyping();
    document.getElementById("send-btn").disabled = true;

    const tid = currentThreadId;

    try {
      const res = await fetch(`${API}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, thread_id: tid })
      });
      const data = await res.json();
      typingEl.remove();
      appendMessage("bot", data.reply);
      scrollDown();
    } catch (e) {
      typingEl.remove();
      appendMessage("bot", "❌ Server se connect nahi ho paya. FastAPI chal raha hai?");
    }

    document.getElementById("send-btn").disabled = false;

    // currentThreadId restore karke thread list refresh karo
    setThread(tid);
    await loadThreads();
    highlightActive();
  }

  // ── Messages ─────────────────────────────────────────────────
  function appendMessage(role, text) {
    const win = document.getElementById("chat-win");
    const div = document.createElement("div");
    div.className = `msg ${role === "user" ? "user" : "bot"}`;
    div.innerHTML = `
      <div class="mav">${role === "user" ? "N" : "✦"}</div>
      <div class="bubble">${renderMd(text)}</div>`;
    win.appendChild(div);
  }

  function showTyping() {
    const win = document.getElementById("chat-win");
    const div = document.createElement("div");
    div.className = "msg bot";
    div.innerHTML = `
      <div class="mav">✦</div>
      <div class="bubble tbubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    win.appendChild(div);
    scrollDown();
    return div;
  }

  // ── Markdown ─────────────────────────────────────────────────
  function renderMd(t) {
    t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) =>
      `<pre><code>${escHtml(c.trim())}</code></pre>`);
    t = t.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
    t = t.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    t = t.replace(/^## (.+)$/gm, "<h2>$1</h2>");
    t = t.replace(/^### (.+)$/gm, "<h3>$1</h3>");
    t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
      '<a href="$2" target="_blank">$1</a>');
    t = t.replace(/(^|\s)(https?:\/\/[^\s<"]+)/g,
      '$1<a href="$2" target="_blank">$2</a>');
    t = t.replace(/^[\-\*] (.+)$/gm, "<li>$1</li>");
    t = t.replace(/^\d+\. (.+)$/gm, "<li>$1</li>");
    t = t.replace(/^Source:\s*(.+)$/gm,
      '<span class="src">📎 $1</span>');
    t = t.replace(/\n{2,}/g, "</p><p>").replace(/\n/g, "<br/>");
    return `<p>${t}</p>`;
  }

  function escHtml(t) {
    return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 150) + "px";
  }

  function fillInput(el) {
    document.getElementById("msg-in").value =
      el.textContent.replace(/^[^\w\s]*\s*/, "").trim();
    document.getElementById("msg-in").focus();
  }

  // ── Init ─────────────────────────────────────────────────────
  async function init() {
    await loadThreads();
    // agar pehle se thread tha toh uski history load karo
    if (currentThreadId) {
      try {
        const res = await fetch(`${API}/history/${currentThreadId}`);
        const data = await res.json();
        if (data.messages && data.messages.length > 0) {
          clearChatWin();
          data.messages.forEach(m => appendMessage(m.role, m.content));
          scrollDown();
          highlightActive();
        }
      } catch (e) {}
    }
  }

  init();
</script>
</body>
</html>
