<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multi-Tool AI Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3e;
      --accent:    #7c6ef8;
      --accent-2:  #a78bfa;
      --user-bg:   #2a2542;
      --bot-bg:    #1e2235;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --danger:    #ef4444;
      --radius:    14px;
      --font:      'Segoe UI', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 12px;
    }

    #sidebar h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 4px;
    }

    #new-chat-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }
    #new-chat-btn:hover { background: var(--accent-2); }

    #thread-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .thread-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      transition: background 0.15s;
    }
    .thread-item:hover { background: var(--border); color: var(--text); }
    .thread-item.active { background: var(--user-bg); color: var(--accent-2); }

    .thread-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 15px;
      padding: 2px 5px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.15s;
    }
    .del-btn:hover { color: var(--danger); }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }

    #header .avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #ec4899);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    #header .info h1 { font-size: 16px; font-weight: 700; }
    #header .info p  { font-size: 12px; color: var(--muted); }

    .status-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 4px;
      display: inline-block;
    }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--muted);
      text-align: center;
    }
    #empty-state .big-icon { font-size: 48px; }
    #empty-state h3 { font-size: 20px; color: var(--text); }
    #empty-state p  { font-size: 14px; max-width: 340px; line-height: 1.6; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .suggestion-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      transition: border-color 0.2s;
    }
    .suggestion-chip:hover { border-color: var(--accent); color: var(--accent-2); }

    .message {
      display: flex;
      gap: 12px;
      max-width: 800px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px; min-width: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .message.user .msg-avatar { background: var(--accent); }
    .message.bot  .msg-avatar { background: var(--bot-bg); border: 1px solid var(--border); }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      max-width: 620px;
    }
    .message.user .bubble {
      background: var(--user-bg);
      border-radius: var(--radius) 4px var(--radius) var(--radius);
    }
    .message.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
    }

    .bubble strong { color: var(--accent-2); }
    .bubble code {
      background: #0d0f18;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 6px;
      font-size: 13px;
      font-family: 'Fira Code', 'Consolas', monospace;
    }
    .bubble pre {
      background: #0d0f18;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-top: 8px;
      overflow-x: auto;
    }
    .bubble pre code { border: none; padding: 0; background: none; }
    .bubble table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 13px;
    }
    .bubble table th, .bubble table td {
      border: 1px solid var(--border);
      padding: 7px 12px;
      text-align: left;
    }
    .bubble table th { background: var(--surface); color: var(--accent-2); }
    .bubble ul, .bubble ol { padding-left: 20px; }
    .bubble li { margin-bottom: 4px; }
    .bubble h2 { font-size: 15px; color: var(--accent-2); margin: 10px 0 6px; }
    .bubble h3 { font-size: 14px; color: var(--text); margin: 8px 0 4px; }

    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    #input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      padding: 12px 16px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 160px;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      width: 48px; height: 48px;
      cursor: pointer;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    #send-btn:hover  { background: var(--accent-2); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>Conversations</h2>
  <button id="new-chat-btn" onclick="newChat()">＋ New Chat</button>
  <div id="thread-list"></div>
</div>

<div id="main">
  <div id="header">
    <div class="avatar">🤖</div>
    <div class="info">
      <h1>Multi-Tool Assistant</h1>
      <p><span class="status-dot"></span>Weather · Stocks · Search · Calculator</p>
    </div>
  </div>

  <div id="chat-window">
    <div id="empty-state">
      <div class="big-icon">✨</div>
      <h3>What can I help you with?</h3>
      <p>Ask me anything — I can search the web, check weather, get stock prices, and do math.</p>
      <div class="suggestions">
        <span class="suggestion-chip" onclick="fillInput(this)">🌤 Weather in Mumbai</span>
        <span class="suggestion-chip" onclick="fillInput(this)">📈 AAPL stock price</span>
        <span class="suggestion-chip" onclick="fillInput(this)">🔢 (456 * 78) / 12</span>
        <span class="suggestion-chip" onclick="fillInput(this)">🔍 Latest AI news</span>
      </div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="msg-input" placeholder="Type a message..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const API = "http://127.0.0.1:8000";
  let currentThread = null;

  function makeThreadId() {
    return "thread-" + Date.now();
  }

  // ── loadThreads: preview dikhao ──────────────────────────────
  async function loadThreads() {
    const res  = await fetch(`${API}/threads`);
    const data = await res.json();
    const list = document.getElementById("thread-list");
    list.innerHTML = "";

    (data.threads || []).reverse().forEach(({ thread_id, preview }) => {
      const item = document.createElement("div");
      item.className = "thread-item" + (thread_id === currentThread ? " active" : "");
      item.innerHTML = `
        <span class="thread-name">💬 ${preview}</span>
        <button class="del-btn" title="Delete" onclick="deleteThread('${thread_id}', event)">🗑</button>
      `;
      item.addEventListener("click", () => switchThread(thread_id));
      list.appendChild(item);
    });
  }

  async function switchThread(tid) {
    currentThread = tid;
    const win = document.getElementById("chat-window");
    win.innerHTML = "";
    await loadHistory(tid);
    await loadThreads();
  }

  async function loadHistory(tid) {
    const win = document.getElementById("chat-window");
    win.innerHTML = "";
    const res  = await fetch(`${API}/history/${tid}`);
    const data = await res.json();
    (data.messages || []).forEach(m => appendMessage(m.role, m.content));
    win.scrollTop = win.scrollHeight;
  }

  async function deleteThread(tid, e) {
    e.stopPropagation();
    await fetch(`${API}/thread`, {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ thread_id: tid })
    });
    if (currentThread === tid) {
      currentThread = null;
      resetToEmpty();
    }
    await loadThreads();
  }

  function newChat() {
    currentThread = makeThreadId();
    resetToEmpty();
    loadThreads();
  }

  function resetToEmpty() {
    const win = document.getElementById("chat-window");
    win.innerHTML = `
      <div id="empty-state">
        <div class="big-icon">✨</div>
        <h3>What can I help you with?</h3>
        <p>Ask me anything — I can search the web, check weather, get stock prices, and do math.</p>
        <div class="suggestions">
          <span class="suggestion-chip" onclick="fillInput(this)">🌤 Weather in Mumbai</span>
          <span class="suggestion-chip" onclick="fillInput(this)">📈 AAPL stock price</span>
          <span class="suggestion-chip" onclick="fillInput(this)">🔢 (456 * 78) / 12</span>
          <span class="suggestion-chip" onclick="fillInput(this)">🔍 Latest AI news</span>
        </div>
      </div>`;
  }

  // ── sendMessage ──────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById("msg-input");
    const text  = input.value.trim();
    if (!text) return;

    if (!currentThread) {
      currentThread = makeThreadId();
    }

    const es = document.getElementById("empty-state");
    if (es) es.remove();

    input.value = "";
    input.style.height = "auto";

    appendMessage("user", text);
    const typing = showTyping();
    document.getElementById("send-btn").disabled = true;

    try {
      const res  = await fetch(`${API}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, thread_id: currentThread })
      });
      const data = await res.json();
      typing.remove();
      appendMessage("bot", data.reply);
    } catch (err) {
      typing.remove();
      appendMessage("bot", "❌ Server se connect nahi ho paya. FastAPI chal raha hai?");
    }

    document.getElementById("send-btn").disabled = false;
    await loadThreads();
  }

  function appendMessage(role, text) {
    const win = document.getElementById("chat-window");
    const msg = document.createElement("div");
    msg.className = `message ${role === "user" ? "user" : "bot"}`;
    msg.innerHTML = `
      <div class="msg-avatar">${role === "user" ? "👤" : "🤖"}</div>
      <div class="bubble">${renderMarkdown(text)}</div>
    `;
    win.appendChild(msg);
    win.scrollTop = win.scrollHeight;
  }

  function showTyping() {
    const win = document.getElementById("chat-window");
    const msg = document.createElement("div");
    msg.className = "message bot";
    msg.id = "typing-indicator";
    msg.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="bubble typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    win.appendChild(msg);
    win.scrollTop = win.scrollHeight;
    return msg;
  }

  function renderMarkdown(text) {
    text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escHtml(code.trim())}</code></pre>`);
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
    text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    text = text.replace(/^## (.+)$/gm, "<h2>$1</h2>");
    text = text.replace(/^### (.+)$/gm, "<h3>$1</h3>");
    text = text.replace(/^\- (.+)$/gm, "<li>$1</li>");
    text = text.replace(/(<li>.*<\/li>)/s, "<ul>$1</ul>");
    text = text.replace(/^\d+\. (.+)$/gm, "<li>$1</li>");
    text = text.replace(/\n{2,}/g, "</p><p>").replace(/\n/g, "<br/>");
    return `<p>${text}</p>`;
  }

  function escHtml(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 160) + "px";
  }

  function fillInput(el) {
    const text = el.textContent.replace(/^[^\w\s]*\s*/, "").trim();
    document.getElementById("msg-input").value = text;
    document.getElementById("msg-input").focus();
  }

  // ── Init ─────────────────────────────────────────────────────
  loadThreads();
</script>
</body>
</html>
